<!DOCTYPE html>
<html>
<head>
    <title>📂 Smart File Organizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=3) }}">
</head>

<body>

<div class="container">
    <h2>📂 Smart File Organizer</h2>
    <p class="subtitle">Organize files smartly with duplicate detection</p>

    <!--  UPDATED FORM -->
    <form onsubmit="startLoading(); return false;" enctype="multipart/form-data">
        
        <!-- 🔁 REPLACED PATH INPUT WITH FILE UPLOAD -->
        <input type="file" name="files" multiple required>

        <label>
            <input type="checkbox" name="dry_run"> Dry Run
        </label>

        <button type="submit">Start Organizing</button>
    </form>

    <!-- Loader -->
    <div id="loader" class="loader" style="display:none;"></div>

    <!-- Progress Bar -->
    <div class="progress-container" id="progress-container" style="display:none;">
        <div id="progress-bar"></div>
    </div>

    <!-- Progress Text -->
    <p id="progress-text"></p>

    <!-- Logs -->
    <div class="logs" id="logs-box"></div>

    <!-- Message -->
    <p class="message">{{ message }}</p>

</div>

<script>
let interval = null;

async function startLoading() {
    //  Reset UI
    document.getElementById("loader").style.display = "block";
    document.getElementById("progress-container").style.display = "block";
    document.getElementById("logs-box").innerHTML = "";
    document.getElementById("progress-bar").style.width = "0%";

    let progressText = document.getElementById("progress-text");
    progressText.innerText = "Starting...";
    progressText.classList.remove("completed");

    const form = document.querySelector("form");
    const formData = new FormData(form);

    //  Start backend
    await fetch("/", {
        method: "POST",
        body: formData
    });

    let bar = document.getElementById("progress-bar");
    let logBox = document.getElementById("logs-box");

    if (interval) clearInterval(interval);

    interval = setInterval(async () => {
        try {
            let res = await fetch("/status");
            let data = await res.json();

            // Update progress
            bar.style.width = data.progress + "%";
            progressText.innerText = data.progress + "% Completed";

            // Logs
            logBox.innerHTML = data.logs
                .map(log => `<div class="log-line">${log}</div>`)
                .join("");

            //  Completed
            if (data.progress >= 100) {
                progressText.innerText = "✅ Completed!";
                progressText.classList.add("completed");
                document.getElementById("loader").style.display = "none";
                clearInterval(interval);
            }

            //  Error
            if (data.error) {
                logBox.innerHTML += `<div class="log-line">❌ ERROR: ${data.error}</div>`;
                progressText.innerText = "❌ Failed";
                document.getElementById("loader").style.display = "none";
                clearInterval(interval);
            }

        } catch (err) {
            console.error("Error fetching status:", err);
        }

    }, 500);
}
</script>

</body>
</html>
